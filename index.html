<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Assistant IA Vocal</title>
    <style>
        /* Style pour le corps de la page */
        body {
            /* On ajoute un espace en bas pour que le contenu ne soit pas caché par la barre de navigation */
            padding-bottom: 90px;
        }

        /* Conteneur principal de la barre de navigation */
        .bottom-navigation-bar {
            position: fixed;
            /* La barre reste visible même en scrollant */
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #121212;
            display: flex;
            /* Utilisation de Flexbox pour aligner les boutons */
            justify-content: space-around;
            /* Distribue l'espace équitablement autour des boutons */
            align-items: center;
            padding: 10px 0;
            border-top: 1px solid #333;
            /* Petite bordure pour la finition */
            box-shadow: 0 -3px 10px rgba(0, 0, 0, 0.2);
            z-index: 1003;
            /* <--- AJOUTEZ CETTE LIGNE */
        }

        /* Style commun pour chaque bouton et lien dans la barre */
        .nav-item {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
            /* Enlève le surlignage bleu sur mobile */
        }

        /* Style pour les icônes SVG */
        .nav-item svg {
            width: 32px;
            height: 32px;
            color: #a0a0a0;
            /* Couleur par défaut des icônes (flèche et hamburger) */
            transition: all 0.2s ease-in-out;
        }

        /* Effet au survol ou au clic pour améliorer l'expérience utilisateur */
        .nav-item:hover svg {
            color: #ffffff;
            transform: scale(1.1);
        }

        /* Styles spécifiques pour le bouton du milieu (Accueil) */
        #home-icon .outer-shape {
            stroke: #4a90e2;
            /* Le contour bleu/violet */
            stroke-width: 1.7;
            fill: none;
        }

        #home-icon .inner-shape {
            stroke: #d0d0d0;
            /* Le carré intérieur gris clair */
            stroke-width: 1.7;
            fill: none;
        }

        #home-button:hover #home-icon .outer-shape {
            stroke: #6cb0ff;
        }

        #home-button:hover #home-icon .inner-shape {
            stroke: #ffffff;
        }


        /* STYLES DE L'ASSISTANT (INCHANGÉS) */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            background-color: #1a1a1d;
            background-image: url('https://images.unsplash.com/photo-1550745165-9bc0b252726a?q=80&w=1920&auto-format&fit=crop');
            background-size: cover;
            background-position: center;
            padding-bottom: 90px;
            /* <--- LIGNE AJOUTÉE ICI */
        }

        #assistant-card {
            width: 90%;
            max-width: 400px;
            padding: 40px 20px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background-color: rgba(25, 25, 29, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            transition: box-shadow 0.2s ease-in-out;
        }

        #assistant-card.active-feedback {
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37), inset 0 0 0 2px rgba(255, 255, 255, 0.8);
        }

        #mic-container {
            transition: transform 0.2s ease;
        }

        #assistant-card:hover #mic-container {
            transform: scale(1.1);
        }

        #mic-icon {
            width: 50px;
            height: 50px;
        }

        #status {
            font-size: 1.2em;
            margin: 0;
            min-height: 1.5em;
            max-height: 200px;
            overflow-y: auto;
            user-select: none;
            -webkit-user-select: none;
            pointer-events: none;
        }

        #listening-animation {
            display: none;
            height: 50px;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .sound-wave {
            display: block;
            width: 5px;
            height: 8px;
            border-radius: 3px;
            background-color: white;
            animation: sound-wave-animation 1.2s infinite ease-in-out;
        }

        @keyframes sound-wave-animation {

            0%,
            40%,
            100% {
                transform: scaleY(0.5);
            }

            20% {
                transform: scaleY(2.5);
            }
        }

        .sound-wave:nth-child(2) {
            animation-delay: -1.0s;
        }

        .sound-wave:nth-child(3) {
            animation-delay: -0.8s;
        }

        .sound-wave:nth-child(4) {
            animation-delay: -0.6s;
        }

        #wiki-button {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #fff;
            color: #222;
            padding: 12px 24px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 1em;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease-in-out;
            z-index: 100;
            cursor: pointer;
        }

        #wiki-button:hover {
            background-color: #eee;
            transform: translateX(-50%) scale(1.05);
        }

        #stop-instruction {
            display: block;
            position: fixed;
            bottom: 80px;
            left: 0;
            width: 100%;
            margin: 0;
            padding: 10px 0;
            background-color: rgba(0, 0, 0, 0.3);
            font-size: 1em;
            font-weight: normal;
            z-index: 99;
        }

        #interrupt-button {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            border: none;
            border-radius: 0;
            transform: none;
            background-color: #DB4437;
            color: white;
            font-size: 1.5em;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: background-color 0.2s ease-in-out;
        }

        #interrupt-button:hover {
            background-color: #C33D2E;
        }

        #fullscreenBtn {
            position: fixed;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 9999;
            width: 40px;
            height: 40px;
        }

        /* NOUVEAU : STYLES POUR LA VUE WIKIPÉDIA */
        .hidden {
            display: none !important;
        }

        /* 1. ON MODIFIE LA VUE PRINCIPALE */
        #wiki-view {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #fff;
            color: #202122;
            z-index: 1001;
            overflow-y: auto;
            /* padding: 20px;
            <-- ON RETIRE CETTE LIGNE */
            box-sizing: border-box;
            display: flex;
            justify-content: center;
        }

        /* 2. ON MODIFIE LE CONTENEUR DU TEXTE */
        #wiki-container {
            width: 100%;
            max-width: 1200px;
            padding: 0 25px;
            /* <--- ON AJOUTE LE PADDING GAUCHE/DROITE ICI */
            box-sizing: border-box;
            /* <--- ON AJOUTE ÇA POUR ÉVITER LES DÉBORDEMENTS */
        }

        #close-wiki-btn {
            position: sticky;
            top: 10px;
            left: 10px;
            padding: 10px 20px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            background-color: #222;
            color: #fff;
            border: none;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            z-index: 1002;
        }

        #wiki-content {
            font-family: "Georgia", "Times New Roman", serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            word-wrap: break-word;
            line-height: 1.8;
            font-size: 1.2em;
            margin-top: 20px;
        }

        /* ===== LEFT PHOTO PANEL ===== */
        #left-photo-panel {
            position: fixed;
            left: 0;
            top: 0;
            width: 30%;
            height: 100%;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
            cursor: pointer;
            overflow: hidden;
            border-right: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.5);
        }

        #left-photo-panel #left-panel-img {
            max-width: 96%;
            max-height: 96vh;
            object-fit: contain;
            image-orientation: from-image;
            border-radius: 8px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        #left-photo-panel #left-panel-img:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.15);
        }

        #left-photo-panel .panel-placeholder {
            color: #555;
            font-size: 1.1em;
            text-align: center;
            padding: 20px;
        }

        /* Push main content right ONLY when panel is visible */
        body.with-panel {
            padding-left: 30%;
        }

        body.with-panel #stop-instruction {
            left: 30%;
            width: 70%;
        }

        body.with-panel #interrupt-button {
            left: 30%;
            width: 70%;
        }

        body.with-panel .bottom-navigation-bar {
            left: 30%;
            width: 70%;
        }

        /* Navbar needs to be ON TOP of the modal (z-index 10000) */
        .bottom-navigation-bar {
            z-index: 20000 !important;
            /* Higher than modal */
        }

        /* ===== PHOTO MODAL ===== */
        #photo-modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.97);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #photo-modal-overlay.visible {
            display: flex;
        }

        #photo-modal-overlay #modal-img {
            max-width: 85%;
            max-height: 85vh;
            object-fit: contain;
            image-orientation: from-image;
            border-radius: 8px;
        }

        #modal-close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 2em;
            width: 55px;
            height: 55px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10001;
            border-radius: 50%;
            transition: all 0.2s;
        }

        #modal-close-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .modal-nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, #FF0000, #CC0000);
            color: #fff;
            border: 3px solid #fff;
            font-size: 2.5em;
            font-weight: bold;
            width: 80px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border-radius: 50%;
            z-index: 10001;
            transition: all 0.2s ease;
            box-shadow: 0 4px 20px rgba(255, 0, 0, 0.5);
            user-select: none;
        }

        .modal-nav-arrow:hover {
            transform: translateY(-50%) scale(1.15);
            box-shadow: 0 6px 30px rgba(255, 0, 0, 0.8);
        }

        .modal-nav-arrow:active {
            transform: translateY(-50%) scale(0.95);
        }

        #modal-arrow-left {
            left: 20px;
        }

        #modal-arrow-right {
            right: 20px;
        }

        #modal-position {
            position: absolute;
            bottom: 25px;
            color: white;
            font-size: 1.3em;
            background: rgba(255, 255, 255, 0.15);
            padding: 8px 25px;
            border-radius: 20px;
        }

        /* ===== RING NOTIFICATION ===== */
        #ring-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10002;
            justify-content: center;
            align-items: center;
        }

        #ring-overlay.visible {
            display: flex;
        }

        .ring-box {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 3px solid #FFD700;
            border-radius: 25px;
            padding: 50px 70px;
            text-align: center;
            animation: ringPulse 0.6s infinite alternate;
        }

        .ring-box .ring-icon {
            font-size: 4em;
            margin-bottom: 15px;
        }

        .ring-box .ring-text {
            font-size: 1.8em;
            color: #FFD700;
            font-weight: bold;
        }

        .ring-box .ring-countdown {
            margin-top: 20px;
            font-size: 3em;
            color: #fff;
            font-weight: bold;
        }

        @keyframes ringPulse {
            from {
                transform: scale(1);
                box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            }

            to {
                transform: scale(1.05);
                box-shadow: 0 0 60px rgba(255, 215, 0, 0.7);
            }
        }

        /* ===== NOUVEAU : STYLES POUR L'ENTRÉE DE LA CLÉ API ===== */
        #api-key-overlay {
            position: fixed;
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            z-index: 30000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #api-key-container {
            background-color: rgba(25, 25, 29, 0.8);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            max-width: 90%;
            width: 400px;
        }
        #api-key-input {
            width: 90%;
            padding: 10px;
            margin: 20px 0;
            border-radius: 5px;
            border: none;
            font-size: 16px;
            text-align: center;
        }
        #api-key-save {
            padding: 10px 25px;
            cursor: pointer;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.2s;
        }
        #api-key-save:hover {
            background: #6cb0ff;
        }
    </style>
</head>

<body>

    <div id="api-key-overlay" class="hidden">
        <div id="api-key-container">
            <h3>Configuration de l'Assistant</h3>
            <p>Veuillez entrer votre clé API Gemini :</p>
            <input type="password" id="api-key-input" placeholder="Clé API (AIzaSy...)">
            <br>
            <button id="api-key-save">Enregistrer</button>
        </div>
    </div>

    <div id="left-photo-panel">
        <p class="panel-placeholder">Chargement...</p>
    </div>

    <div id="main-interface">
        <a id="wiki-button" style="display: none;">
            Consulter sur Wikipédia
        </a>
        <div id="assistant-card">
       
             <div id="mic-container">
                <svg id="mic-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512">
                    <path fill="white"
                        d="M192 0C139 0 96 43 96 96V256c0 53 43 96 96 96s96-43 96-96V96c0-53-43-96-96-96zM64 216c0-13.3-10.7-24-24-24s-24 10.7-24 24v40c0 89.1 66.2 162.7 152 174.4V464H120c-13.3 0-24 10.7-24 24s10.7 24 24 24h144c13.3 
 0 24-10.7 24-24s-10.7-24-24-24H216V430.4c85.8-11.7 152-85.3 152-174.4V216c0-13.3-10.7-24-24-24s-24 10.7-24 24v40c0 70.7-57.3 128-128 128s-128-57.3-128-128V216z" />
                </svg>
            </div>
            <div id="listening-animation">
                <span class="sound-wave"></span><span class="sound-wave"></span><span class="sound-wave"></span><span
                    class="sound-wave"></span>
          
            </div>
            <p id="status">Comment puis-je vous aider ?</p>
        </div>
        <p id="stop-instruction">Pour arrêter la conversation dites-moi "j'arrête"</p>
        <button id="interrupt-button">STOP</button>
    </div>

    <div id="wiki-view" class="hidden">
        <div id="wiki-container">
            <button id="close-wiki-btn">Retour</button>
            <div id="wiki-content"></div>
     
         </div>
    </div>

    <button id="fullscreenBtn">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2"
            width="100%" height="100%">
            <path stroke-linecap="round" stroke-linejoin="round"
                d="M8 3H5a2 2 0 00-2 2v3m0 8v3a2 2 0 002 2h3m8-16h3a2 2 0 012 2v3m0 8v3a2 2 0 01-2 2h-3" />
        </svg>
 
     </button>

    <script>
        // SÉLECTION DES ÉLÉMENTS
        const assistantCard = document.getElementById('assistant-card');
        const micContainer = document.getElementById('mic-container');
        const statusDiv = document.getElementById('status');
        const listeningAnimation = document.getElementById('listening-animation');
        const wikiButton = document.getElementById('wiki-button');
        const interruptButton = document.getElementById('interrupt-button');
        // NOUVEAU : Éléments pour la vue Wikipédia
        const mainInterface = document.getElementById('main-interface');
        const wikiView = document.getElementById('wiki-view');
        const wikiContent = document.getElementById('wiki-content');
        const closeWikiBtn = document.getElementById('close-wiki-btn');
// ==== GESTION DE LA CLÉ API AVEC LOCALSTORAGE ====
        let API_KEY = localStorage.getItem('gemini_api_key') || "";
        const apiKeyOverlay = document.getElementById('api-key-overlay');
        const apiKeyInput = document.getElementById('api-key-input');
        const apiKeySaveBtn = document.getElementById('api-key-save');

        // Si aucune clé n'est enregistrée, on affiche la fenêtre
        if (!API_KEY) {
            apiKeyOverlay.classList.remove('hidden');
        }

        // Écouteur d'événement pour sauvegarder la clé
        apiKeySaveBtn.addEventListener('click', () => {
            const val = apiKeyInput.value.trim();
            if (val) {
                API_KEY = val;
                localStorage.setItem('gemini_api_key', val);
                apiKeyOverlay.classList.add('hidden');
            } else {
                alert("Veuillez entrer une clé valide.");
            }
        });
        // =================================================

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const synthesis = window.speechSynthesis;

        let isConfirmingStop = false;
        let autoRestart = false;
        if (!SpeechRecognition || !synthesis) {
            statusDiv.textContent = "API vocales non supportées.";
            micContainer.style.display = 'none';
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'fr-FR';
            recognition.continuous = false;

            function speak(text, onEndCallback) {
                autoRestart = false;
                if (synthesis.speaking) synthesis.cancel();
                setTimeout(() => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'fr-FR';
                    utterance.onend = () => { if (onEndCallback) onEndCallback(); };
                    synthesis.speak(utterance);
 
                }, 100);
            }

            async function searchWikipedia(subject) {
                if (!subject) return;
                const endpoint = `https://fr.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(subject)}&limit=1&namespace=0&format=json&origin=*`;
                try {
                    const response = await fetch(endpoint);
                    const data = await response.json();
                    const pageTitle = data[1]?.[0];
                    if (pageTitle) {
                        wikiButton.dataset.subject = pageTitle;
                        wikiButton.style.display = 'inline-block';
                    }
                } catch (error) { console.error("Erreur API Wikipédia:", error);
                }
            }

            async function callGeminiAPI(prompt) {
                // Si l'utilisateur n'a pas mis de clé API, on l'avertit
                if (!API_KEY) {
                    speak("Veuillez configurer votre clé A P I.");
                    statusDiv.textContent = "Clé API manquante. Rechargez la page.";
                    return;
                }

                autoRestart = false;
                statusDiv.textContent = "L'IA réfléchit...";
                wikiButton.style.display = 'none';

                // LIGNE RESTAURÉE COMME DANS VOTRE CODE D'ORIGINE
                const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;
                const fullPrompt = `Réponds à la question suivante. En plus de ta réponse, identifie l'entité (personne, lieu, concept) la plus pertinente de ta réponse pour une recherche Wikipédia.
                Formate ta sortie EXCLUSIVEMENT en JSON avec deux clés : "reponse" pour ton texte, et "sujet" pour l'entité.
                Si aucun sujet n'est pertinent, mets "sujet" à null. La question est : "${prompt}"`;
                try {
                    const res = await fetch(API_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                     
                        body: JSON.stringify({ contents: [{ parts: [{ text: fullPrompt }] }] })
                    });
                    if (!res.ok) {
                        const errorData = await res.json();
                        throw new Error(errorData.error.message || `Erreur ${res.status}`);
                    }
                    const data = await res.json();
                    let apiContent = data?.candidates?.[0]?.content?.parts?.[0]?.text || "";
                    let parsedResponse;
                    const jsonMatch = apiContent.match(/{[\s\S]*}/);
                    if (jsonMatch) {
                        try { parsedResponse = JSON.parse(jsonMatch[0]);
                        }
                        catch (e) { parsedResponse = { reponse: apiContent, sujet: null };
                        }
                    } else { parsedResponse = { reponse: apiContent, sujet: null };
                    }

                    const { reponse, sujet } = parsedResponse;
                    if (reponse) {
                        statusDiv.textContent = reponse;
                        searchWikipedia(sujet);
                        const cleanTextForSpeech = reponse.replaceAll('*', '');
                        speak(cleanTextForSpeech, () => {
                            startListeningUI();
                            autoRestart = true;
                            recognition.start();
     
                        });
                    } else { throw new Error("Aucune réponse textuelle reçue de l'API.");
                    }
                } catch (err) {
                    console.error("Erreur Gemini:", err);
                    statusDiv.textContent = `Erreur: ${err.message}`;
                    speak(`Une erreur est survenue.`);
                }
            }

            function startListeningUI() { micContainer.style.display = 'none';
                listeningAnimation.style.display = 'flex'; statusDiv.textContent = "Je vous écoute..."; }
            function stopListeningUI() { micContainer.style.display = 'block';
                listeningAnimation.style.display = 'none'; }

            const startVocalAssistant = (event) => {
                if (event) event.preventDefault();

                if (listeningAnimation.style.display === 'flex') return;

                    recognition.start();
                });
            });
            recognition.onresult = (event) => {
                autoRestart = false;
                const transcript = event.results[0][0].transcript.toLowerCase().trim();
                if (isConfirmingStop) {
                    isConfirmingStop = false;
                    if (transcript.includes("oui")) {
                        speak("D'accord, posez votre question.", () => {
                            startListeningUI();
                            autoRestart = true;
          
                            recognition.start();
                        });
                    } else {
                        statusDiv.textContent = "Au revoir !";
                        speak("Au revoir");
                    }
                } else {
                    if (transcript.includes("j'arrête") || transcript.includes("arrête") || transcript.includes("arrêter")) {
                        statusDiv.textContent = "Au revoir !";
                        speak("Au revoir");
                    } else {
                        callGeminiAPI(transcript);
                    }
                }
            };
            recognition.onend = () => {
                if (autoRestart) recognition.start();
                else stopListeningUI();
            };

            recognition.onerror = (event) => {
                console.error("Erreur reconnaissance:", event.error);
                if (event.error === 'no-speech') {

                    // 1. Affiche un message
                    setTimeout(() => {
                        location.reload(); // 2. Recharge la page après 2 secondes
                    }, 2000);
                }
            };
        }

        async function loadWiki(article) {

            try {
                const response = await fetch(url);

                    wikiContent.querySelectorAll('.infobox, .mw-editsection, .reference').forEach(el => el.remove());
